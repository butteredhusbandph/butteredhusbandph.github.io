baseURL = "."
locale = 'en-us'
title = '@butteredhusbandph'
theme = 'mana'

#publishDir = "docs"
publishDir = "public"

[params.avatar]
  [params.avatar.home]
    assetPath = "logo.png"
  [params.avatar.about]
    assetPath = "logo.png"

[params.social]
    github = "https://github.com/penoycentral"
#    linkedin = "https://www.linkedin.com/in/yourprofile"
#    twitter = "yourusername"
    email = "butteredhusbandph@gmail.com"

[taxonomies]
   tag = "tags"
   category = "categories"

[params]
  description = "tech..music..etc"
  favicon = "/favicon/favicon.ico"
  footerText = "Built with Hugo and Mana theme"  # Optional

  # Hero section title (optional - defaults to site.Title)
  heroTitleLine1 = "@butteredhusbandph"  # First line of hero title
  heroTitleLine2 = "all things"    # Second line of hero title (optional)


  [[menus.main]]
    name = 'Home'
    pageRef = '/'
    weight = 10

    [[menus.main]]
      name = 'Posts'
      pageRef = '/posts'
      weight = 20

    [[menus.main]]
      name = 'Tags'
      pageRef = '/tags'
      weight = 30

    [[menus.main]]
      name = 'About'
      url = '/about/'
      weight = 40
